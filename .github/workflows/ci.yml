name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 10 * * 1"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "true"
      - name: "Run tests"
        shell: bash
        run: |
          cmake -E make_directory build
          cmake --version
          cd build
          cmake -G Ninja -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ .. -DCACHES_BUILD_TEST=ON
          cmake --build . --parallel
          ctest -V --output-on-failure --repeat until-fail:10

  build-win:
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-mingw
            clang_cl_asan: false
          - os: windows-latest
            name: windows-clang-cl-asan
            clang_cl_asan: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "true"
      - name: Setup MSVC environment (clang-cl)
        if: runner.os == 'Windows' && matrix.clang_cl_asan
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Add LLVM and ASan runtime to PATH (clang-cl)
        if: runner.os == 'Windows' && matrix.clang_cl_asan
        shell: pwsh
        run: |
          $llvmRoot = "C:\\Program Files\\LLVM"
          $llvmBin = Join-Path $llvmRoot "bin"
          if (Test-Path (Join-Path $llvmBin "clang-cl.exe")) {
            $llvmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            Write-Host "clang-cl.exe not found at: $llvmBin"
            exit 1
          }

          $asanDll = Get-ChildItem -Path $llvmRoot -Recurse -File -Filter "clang_rt.asan_dynamic-x86_64.dll" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if ($null -eq $asanDll) {
            Write-Host "clang_rt.asan_dynamic-x86_64.dll not found under: $llvmRoot"
            exit 1
          }

          $asanDir = $asanDll.DirectoryName
          $asanDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "ASAN_RUNTIME_DIR=$asanDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIB=$asanDir;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: "Run tests"
        shell: pwsh
        run: |
          cmake -E make_directory build
          cmake --version

          if ( "${{ matrix.clang_cl_asan }}" -eq "true" )
          {
            clang-cl --version
          }

          cd build

          if ( "${{ matrix.clang_cl_asan }}" -eq "true" )
          {
            # Prevent Git-Bash (MSYS2) from rewriting MSVC-style flags like /fsanitize=address.
            $env:MSYS2_ARG_CONV_EXCL="*"
            cmake -G Ninja .. `
              -DCACHES_BUILD_TEST=ON `
              -DCMAKE_C_COMPILER=clang-cl `
              -DCMAKE_CXX_COMPILER=clang-cl `
              -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
              -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL `
              -DCMAKE_TRY_COMPILE_CONFIGURATION=Release `
              -DCMAKE_BUILD_TYPE=Debug `
              -DCMAKE_C_FLAGS="/fsanitize=address -Wno-unused-command-line-argument" `
              -DCMAKE_CXX_FLAGS="/fsanitize=address /EHsc -Wno-unused-command-line-argument" `
              -DCMAKE_EXE_LINKER_FLAGS="/INCREMENTAL:NO /DEFAULTLIB:clang_rt.asan_dynamic-x86_64.lib /DEFAULTLIB:clang_rt.asan_dynamic_runtime_thunk-x86_64.lib" `
              -DCMAKE_SHARED_LINKER_FLAGS="/INCREMENTAL:NO /DEFAULTLIB:clang_rt.asan_dynamic-x86_64.lib /DEFAULTLIB:clang_rt.asan_dynamic_runtime_thunk-x86_64.lib"

            $env:ASAN_OPTIONS="halt_on_error=1:abort_on_error=1:symbolize=1"
          }
          else
          {
            cmake -G Ninja -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ .. -DCACHES_BUILD_TEST=ON
          }

          cmake --build . --parallel
          ctest -V --output-on-failure --repeat until-fail:10

  build-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "true"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov gcc g++ llvm
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install gcovr
        run: uv tool install gcovr
      - name: Run tests with coverage options
        run: |
          export PATH=$HOME/.local/bin:$PATH
          BASE_DIR="$(pwd)"
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Debug -DCACHES_BUILD_TEST=ON -DCACHES_ENABLE_COVERAGE=ON
          cmake --build . --parallel $(nproc)
          ctest -V --output-on-failure
          cmake --build . --target coverage
          # mkdir coverage
          # cd coverage
          # lcov --directory ../ -c -o coverage-raw.info --ignore-errors mismatch,source --rc geninfo_unexecuted_blocks=1
          # lcov --remove coverage-raw.info "/usr/*" "${BASE_DIR}/deps/*" "${BASE_DIR}/test/*" -o coverage.info --ignore-errors mismatch
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: build/coverage.info
          fail_ci_if_error: false

  build-clang:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: [14, 15, 16, 17, 18, 19, 20, 21]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "true"
      - name: Install Clang
        uses: egor-tensin/setup-clang@v2
        with:
          version: ${{ matrix.tag }}
      - name: Install libc++
        run: sudo apt-get install -y libc++-${{ matrix.tag }}-dev libc++abi-${{ matrix.tag }}-dev
      - name: Set environment variables
        run: |
          echo "CC=clang-${{ matrix.tag }}" >> $GITHUB_ENV
          echo "CXX=clang++-${{ matrix.tag }}" >> $GITHUB_ENV
      - name: "Run tests"
        run: |
          mkdir build
          cmake --version
          ${{ env.CC }} --version
          ${{ env.CXX }} --version
          cd build
          cmake .. -DCMAKE_CXX_FLAGS="-stdlib=libc++" -DCACHES_BUILD_TEST=ON
          cmake --build . --parallel
          ctest -V --output-on-failure --repeat until-fail:10
        shell: bash

  build-gcc:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: [9, 10, 11, 12, 13, 14]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "true"
      - name: Setup GCC
        uses: egor-tensin/setup-gcc@v2
        with:
          version: ${{ matrix.tag }}
      - name: Set environment variables
        run: |
          echo "CC=gcc-${{ matrix.tag }}" >> $GITHUB_ENV
          echo "CXX=g++-${{ matrix.tag }}" >> $GITHUB_ENV
      - name: "Run tests"
        run: |
          mkdir build
          cmake --version
          ${{ env.CC }} --version
          ${{ env.CXX }} --version
          cd build
          cmake .. -DCACHES_BUILD_TEST=ON
          cmake --build . -- -j$(nproc)
          ctest -V --output-on-failure --repeat until-fail:10
        shell: bash
